eureka.client.service-url.defaultZone=http://localhost:8761/registry/eureka/

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

springdoc.swagger-ui.urls[0].name=user-service
springdoc.swagger-ui.urls[0].url=/user/v3/api-docs

springdoc.swagger-ui.urls[1].name=payment-service
springdoc.swagger-ui.urls[1].url=/payment/v3/api-docs



